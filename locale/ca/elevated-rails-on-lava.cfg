[mod-name]
elevated-rails-on-lava=Raïls elevats sobre la lava
[mod-description]
elevated-rails-on-lava=Permet construir raïls elevats sobre la lava després de recercar la tecnologia "[technology=rail-support-foundations] [font=default-bold]Fonaments dels suports de raïl[/font]".\nAfegeix icones visuals a la tecnologia per a indicar aquest canvi.\nPermet configurar quines rajoles s'han de canviar amb la recerca tecnològica.
[modifier-description]
rail-support-on-lava=Permet construir raïls elevats també sobre la lava.
[mod-setting-name]
elevated-rails-on-lava-changed-tiles=Rajoles modificades
elevated-rails-on-lava-technology-effect-icon=Icona de l'efecte de la tecnologia
[mod-setting-description]
elevated-rails-on-lava-changed-tiles=Quines rajoles han de veure's afectades pel mod.\nPermet afegir-hi terrenys d'altres mods on no s'hi poden posar raïls.\nCal separar-los per comes, els espais entre paraules s'ignoren.
elevated-rails-on-lava-technology-effect-icon=Si cal afegir una icona d'efecte a la tecnologia "Fonaments dels suports de raïl".

